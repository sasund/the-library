default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: coverage
      description: Evaluate test coverage for recent code and fill gaps with high-value tests - only adds tests worth having
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/coverage/SKILL.md
    - name: context7-cli
      description: Use the ctx7 CLI to fetch library documentation, manage AI coding skills, and configure Context7 MCP
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/context7-cli/SKILL.md
    - name: branch
      description: Create and checkout a new git branch using conventional naming - use when starting work on a feature, bug fix, or task
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/branch/SKILL.md
    - name: find-skills
      description: Helps users discover and install agent skills when they ask questions like "how do I do X", "find a skill for X", or express interest in extending capabilities
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/find-skills/SKILL.md
    - name: grill-me
      description: Interview the user relentlessly about a plan or design until reaching shared understanding, resolving each branch of the decision tree
      source: https://github.com/mattpocock/skills/blob/main/grill-me/SKILL.md
    - name: improve-codebase-architecture
      description: Explore a codebase to find opportunities for architectural improvement, focusing on making the codebase more testable by deepening shallow modules
      source: https://github.com/mattpocock/skills/blob/main/improve-codebase-architecture/SKILL.md
    - name: java-coding-standards
      description: Java coding standards for Spring Boot services - naming, immutability, Optional usage, streams, exceptions, generics, and project layout
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-coding-standards/SKILL.md
    - name: java-docs
      description: Ensure Java types are documented with Javadoc comments following best practices for documentation
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-docs/SKILL.md
    - name: java-junit
      description: Best practices for JUnit 5 unit testing, including data-driven and parameterized tests
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-junit/SKILL.md
    - name: java-maven
      description: Master Apache Maven - POM configuration, plugins, lifecycle, dependency management
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-maven/SKILL.md
    - name: java-microservices
      description: Build microservices with Spring Cloud, service mesh, event-driven architecture, and resilience patterns
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-microservices/SKILL.md
    - name: java-springboot
      description: Best practices for developing applications with Spring Boot - project setup, DI, configuration, REST, testing, security
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-springboot/SKILL.md
    - name: kotlin-springboot
      description: Best practices for developing applications with Spring Boot and Kotlin - idiomatic Kotlin patterns, DI, configuration, REST, testing
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/kotlin-springboot/SKILL.md
    - name: pdf
      description: Read, extract, merge, split, create, watermark, encrypt, OCR, and fill PDF files using Python libraries and CLI tools
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/pdf/SKILL.md
    - name: prd-to-issues
      description: Break a PRD into independently-grabbable GitHub issues using tracer-bullet vertical slices
      source: https://github.com/mattpocock/skills/blob/main/prd-to-issues/SKILL.md
    - name: playwright-cli
      description: Automates browser interactions for web testing, form filling, screenshots, and data extraction from web pages
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/playwright-cli/SKILL.md
    - name: skill-creator
      description: Create new skills, modify and improve existing skills, and measure skill performance with evals and benchmarks
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/skill-creator/SKILL.md
    - name: review
      description: Review recent changes like a senior engineer - checks code quality, security, simplicity, and optional project-specific concerns from REVIEW.md
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/review/SKILL.md
    - name: tdd
      description: Test-driven development with red-green-refactor loop
      source: https://github.com/mattpocock/skills/blob/main/tdd/SKILL.md
    - name: write-a-prd
      description: Create a PRD through user interview, codebase exploration, and module design, then submit as a GitHub issue
      source: https://github.com/mattpocock/skills/blob/main/write-a-prd/SKILL.md
  agents:
    - name: build-validator
      description: Validates build and CI checks pass after changes - runs build, tests, lint, and type checks with pass/fail report. Use before opening a PR.
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/agents/build-validator.md
    - name: code-architect
      description: Reviews code changes for architectural quality - separation of concerns, module boundaries, coupling, scalability, and pattern consistency
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/agents/code-architect.md
    - name: code-simplifier
      description: Cleans up code after Claude finishes - reviews changed code for reuse, quality, efficiency, and CLAUDE.md compliance, then fixes issues found
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/agents/code-simplifier.md
    - name: oncall-guide
      description: On-call incident response agent - triages production incidents, searches logs, traces errors, identifies root causes, and suggests rollback/hotfix/config changes
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/agents/oncall-guide.md
    - name: verify-app
      description: End-to-end verification agent that tests the app is working correctly after changes - build, tests, lint, smoke tests, regression check
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/agents/verify-app.md
  prompts:
    - name: code-review
      description: Code review a pull request - launches parallel agents for bug detection, CLAUDE.md compliance, and inline GitHub comments
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/commands/code-review.md
    - name: babysit
      description: Babysit open PRs - auto-fix CI failures and address incoming review comments using worktree agents
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/commands/babysit.md
    - name: commit-push-pr
      description: Commit staged changes, push to remote, and open a pull request with a conventional commit message
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/commands/commit-push-pr.md
    - name: pr-pruner
      description: Close stale and no-longer-necessary PRs - identifies abandoned or superseded PRs and closes them with a comment
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/commands/pr-pruner.md
    - name: techdebt
      description: Find and kill duplicated code - extracts shared functions, removes redundant utilities, consolidates inconsistent implementations
      source: https://github.com/sasund/sit-library-engineering/blob/main/.claude/commands/techdebt.md
