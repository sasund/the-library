default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: context7-cli
      description: Use the ctx7 CLI to fetch library documentation, manage AI coding skills, and configure Context7 MCP
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/context7-cli/SKILL.md
    - name: find-skills
      description: Helps users discover and install agent skills when they ask questions like "how do I do X", "find a skill for X", or express interest in extending capabilities
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/find-skills/SKILL.md
    - name: java-coding-standards
      description: Java coding standards for Spring Boot services - naming, immutability, Optional usage, streams, exceptions, generics, and project layout
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-coding-standards/SKILL.md
    - name: java-docs
      description: Ensure Java types are documented with Javadoc comments following best practices for documentation
      source: https://github.com/sasund/sit-library-engineering/blob/main/.agents/skills/java-docs/SKILL.md
  agents: []
  prompts: []
